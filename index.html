<!DOCTYPE html>
<html lang="ko" class="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ULLIM</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#f5f0e8" id="theme-meta">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ULLIM">
<style>
@font-face {
  font-family: 'BookkMyungjo';
  src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2302@1.0/BookkMyungjo-Lt.woff2') format('woff2');
  font-weight: 400;
  font-display: swap;
}
@font-face {
  font-family: 'BookkMyungjo';
  src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2302@1.0/BookkMyungjo-Bd.woff2') format('woff2');
  font-weight: 700;
  font-display: swap;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

html.light{
  --bg:#f5f0e8;--bg2:#ede8de;--bg3:#e4dfd4;
  --line:#d0c8b8;--line2:#dcd6ca;
  --text:#1c1608;--text2:#5a4e38;--text3:#8a7e68;--text4:#b0a488;
  --accent:#1c1608;--card:#f0ece2;--gold:#7a4a10;
  --inv-bg:#1c1608;--inv-text:#f5f0e8;
  --inp:#ede8de;--hdr:#f5f0e8;
}
html.dark{
  --bg:#0c0c0c;--bg2:#111;--bg3:#161616;
  --line:#222;--line2:#1a1a1a;
  --text:#e8e0d0;--text2:#a09880;--text3:#666;--text4:#444;
  --accent:#f0e8d8;--card:#111;--gold:#a07840;
  --inv-bg:#f0e8d8;--inv-text:#0c0c0c;
  --inp:#111;--hdr:#0c0c0c;
}

html,body{height:100%;-webkit-font-smoothing:antialiased}
body{background:var(--bg);color:var(--text);font-family:'BookkMyungjo',serif;font-weight:400;min-height:100%;overscroll-behavior:none;transition:background .2s,color .2s}

/* HEADER */
#header{position:fixed;top:0;left:0;right:0;z-index:200;background:var(--hdr);border-bottom:1px solid var(--line);padding-top:env(safe-area-inset-top,0px);transition:background .2s,border-color .2s}
#hi{max-width:640px;margin:0 auto;padding:12px 16px 0}
#htop{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:6px}
#logo{font-family:'BookkMyungjo',serif;font-size:22px;font-weight:700;color:var(--text);letter-spacing:0.06em;line-height:1}
#logo-sub{font-size:9px;color:var(--text4);letter-spacing:0.18em;text-transform:uppercase;margin-top:2px}
#hright{display:flex;align-items:center;gap:4px;flex-shrink:0}
#scrap-nav,#analysis-nav{display:flex;align-items:center;gap:4px}
.nav-btn{padding:4px 10px;font-size:10px;font-family:inherit;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;border-radius:2px;border:1px solid var(--line);background:transparent;color:var(--text3);cursor:pointer;transition:all .15s;white-space:nowrap}
.nav-btn.active{background:var(--inv-bg);color:var(--inv-text);border-color:var(--inv-bg)}
#theme-btn{background:none;border:1px solid var(--line);border-radius:2px;padding:4px 8px;cursor:pointer;font-size:13px;line-height:1}
#srcbar{display:flex;gap:0;overflow-x:auto;padding-bottom:10px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
#srcbar::-webkit-scrollbar{display:none}
.sb{background:none;border:none;padding:4px 10px 4px 0;font-size:10px;font-weight:700;font-family:inherit;letter-spacing:0.06em;cursor:pointer;white-space:nowrap;color:var(--text4);border-bottom:2px solid transparent;transition:all .15s}
.sb.active{color:var(--src-c);border-bottom-color:var(--src-c)}

/* MAIN */
#scroll-area{padding-top:106px}
#main{max-width:640px;margin:0 auto;padding:16px}

/* FILTERS */
#fbar{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
.fsel,.sinp{background:var(--inp);border:1px solid var(--line);color:var(--text);padding:7px 10px;font-size:12px;font-family:inherit;border-radius:3px;outline:none;-webkit-appearance:none;transition:background .2s}
.sinp{flex:1;min-width:100px}
.fsel{flex:0 1 auto}

/* ARTICLE */
.art{border-bottom:1px solid var(--line2);padding:14px 0;display:flex;gap:10px}
.abar{width:3px;flex-shrink:0;border-radius:2px;margin-top:4px;align-self:stretch;min-height:18px}
.abody{flex:1;min-width:0}
.ameta{display:flex;gap:5px;flex-wrap:wrap;align-items:center;margin-bottom:6px}
.bdg{display:inline-block;padding:1px 6px;font-size:9px;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;border-radius:2px}
.atitle{font-family:'BookkMyungjo',serif;font-size:15px;font-weight:700;color:var(--text);line-height:1.4;margin-bottom:5px;text-decoration:none;display:block}
.atitle:active{opacity:.6}
.asum{font-size:12px;color:var(--text2);line-height:1.65}
.aexp{margin-top:8px;background:var(--bg2);border:1px solid var(--line);border-left:3px solid;border-radius:2px;padding:10px 12px;font-size:12px;color:var(--text2);line-height:1.65;transition:background .2s}
.explbl{font-size:9px;color:var(--text4);font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px}
.aacts{display:flex;gap:14px;margin-top:8px}
.aact{background:none;border:none;font-family:inherit;font-size:11px;color:var(--text4);cursor:pointer;padding:0}
.aact.del{color:#993333}

/* COMPARE */
.evg{margin-bottom:36px}
.evh{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.evt{font-family:'BookkMyungjo',serif;font-size:16px;font-weight:700;color:var(--text)}
.evl{flex:1;height:1px;background:var(--line)}
.evc{font-size:10px;color:var(--text4)}
.cgrid{display:flex;flex-direction:column;gap:10px}
@media(min-width:480px){.cgrid{flex-direction:row;flex-wrap:wrap}.ccard{flex:1 1 200px}}
.ccard{background:var(--card);border:1px solid var(--line);border-top:3px solid;border-radius:3px;padding:14px;transition:background .2s}
.ctitle{font-family:'BookkMyungjo',serif;font-size:13px;font-weight:700;color:var(--text);line-height:1.4;margin:7px 0 6px;text-decoration:none;display:block}
.csum{font-size:11px;color:var(--text3);line-height:1.6}
.cpersp{border-top:1px solid var(--line);margin-top:8px;padding-top:8px}
.cpersp-t{font-size:11px;color:var(--gold);line-height:1.55}

/* FORM */
#add-view{padding-bottom:40px}
.fsec-title{font-size:10px;color:var(--text3);font-weight:700;letter-spacing:.12em;text-transform:uppercase;margin-bottom:18px}
.fg{margin-bottom:14px}
.flbl{display:block;font-size:10px;color:var(--text3);font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px}
.fhint{color:var(--text4);font-weight:400;font-size:9px}
.finp,.fsel,.ftxt{width:100%;background:var(--inp);border:1px solid var(--line);color:var(--text);padding:9px 11px;font-size:13px;font-family:inherit;border-radius:3px;outline:none;-webkit-appearance:none;transition:background .2s}
.ftxt{resize:vertical;line-height:1.6}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.facts{display:flex;gap:10px;margin-top:20px}
.btnp{padding:11px 24px;background:var(--inv-bg);color:var(--inv-text);border:none;font-family:inherit;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;border-radius:2px}
.btnp:disabled{opacity:.35;cursor:default}
.btns{padding:11px 18px;background:none;border:1px solid var(--line);color:var(--text3);font-family:inherit;font-size:12px;cursor:pointer;border-radius:2px}

/* SETTINGS */
#settings-view{padding-bottom:60px}
.ssec{margin-bottom:32px}
.ssec-title{font-family:'BookkMyungjo',serif;font-size:16px;font-weight:700;color:var(--text);margin-bottom:14px;display:flex;align-items:center;gap:10px}
.ssec-title::after{content:'';flex:1;height:1px;background:var(--line)}
.srow{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--line2)}
.swatch{width:24px;height:24px;border-radius:3px;border:1px solid var(--line);cursor:pointer;flex-shrink:0;position:relative;overflow:hidden}
.swatch input[type=color]{position:absolute;inset:0;width:150%;height:150%;opacity:0;cursor:pointer;margin:-4px}
.slbl{flex:1;font-size:13px;color:var(--text)}
.sibtn{background:none;border:1px solid var(--line);color:var(--text4);width:28px;height:28px;border-radius:2px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.addrow{display:flex;gap:8px;margin-top:12px;align-items:center}
.addrow input{flex:1;background:var(--inp);border:1px solid var(--line);color:var(--text);padding:8px 10px;font-size:13px;font-family:inherit;border-radius:3px;outline:none}
.aswatch{width:38px;height:38px;border-radius:3px;border:1px solid var(--line);cursor:pointer;flex-shrink:0;position:relative;overflow:hidden}
.aswatch input[type=color]{position:absolute;inset:0;width:150%;height:150%;opacity:0;cursor:pointer;margin:-4px}
.tchips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:12px}
.tchip{display:flex;align-items:center;gap:5px;padding:5px 10px;background:var(--bg2);border:1px solid var(--line);border-radius:20px;font-size:12px;color:var(--text2)}
.tchipdel{background:none;border:none;color:var(--text4);cursor:pointer;font-size:15px;line-height:1;padding:0;margin-left:1px}

/* EMPTY */
.empty{text-align:center;padding:60px 0;color:var(--text4)}
.empty-icon{font-size:28px;margin-bottom:12px}
.empty-txt{font-size:13px;margin-bottom:16px}

/* TOAST */
#toast{position:fixed;bottom:calc(68px + env(safe-area-inset-bottom,0px));left:50%;transform:translateX(-50%) translateY(16px);background:var(--inv-bg);color:var(--inv-text);padding:8px 20px;border-radius:20px;font-size:12px;font-weight:700;opacity:0;transition:all .25s;pointer-events:none;z-index:999;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* FOOTER */
#footer{max-width:640px;margin:0 auto;padding:14px 16px 8px;border-top:1px solid var(--line2);display:flex;gap:12px;flex-wrap:wrap}
.fsrc{font-size:10px;color:var(--text4);display:flex;align-items:center;gap:5px}
.fdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* ── BOTTOM NAV ──────────────────────────────── */
#bnav{
  position:fixed;bottom:0;left:0;right:0;z-index:200;
  background:var(--hdr);border-top:1px solid var(--line);
  display:flex;align-items:stretch;
  padding-bottom:env(safe-area-inset-bottom,0px);
  transition:background .2s,border-color .2s;
}
.bnav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;padding:9px 0 10px;background:none;border:none;
  cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all .15s;
}
.bnav-icon{font-size:15px;line-height:1;color:var(--text4);transition:color .15s}
.bnav-lbl{
  font-family:'BookkMyungjo',serif;font-size:9px;font-weight:700;
  letter-spacing:0.15em;text-transform:uppercase;color:var(--text4);transition:color .15s;
}
.bnav-btn.active .bnav-icon,.bnav-btn.active .bnav-lbl{color:var(--text)}
.bnav-divider{width:1px;background:var(--line);align-self:stretch;flex-shrink:0}

/* ── SEARCH ─────────────────────────────────── */
#search-view{padding-bottom:60px}
.srch-inp-wrap{position:relative;margin-bottom:14px}
.srch-inp-wrap input{width:100%;background:var(--inp);border:1px solid var(--line);color:var(--text);padding:11px 38px 11px 13px;font-size:14px;font-family:inherit;border-radius:3px;outline:none;-webkit-appearance:none;transition:background .2s,border-color .2s}
.srch-inp-wrap input:focus{border-color:var(--text3)}
.srch-clear{position:absolute;right:11px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text4);cursor:pointer;font-size:18px;line-height:1;padding:2px;display:none}
.srch-ctrl{margin-bottom:12px}
.srch-cbar{display:flex;align-items:center;gap:5px;flex-wrap:wrap;padding-bottom:10px;border-bottom:1px solid var(--line2)}
.srch-clbl{font-size:9px;color:var(--text4);font-weight:700;letter-spacing:.12em;text-transform:uppercase;flex-shrink:0;margin-right:1px}
.srch-sep{width:1px;height:14px;background:var(--line2);flex-shrink:0;margin:0 2px}
.sort-btn,.grp-btn{background:none;border:1px solid var(--line);border-radius:20px;padding:3px 10px;font-size:10px;font-weight:700;font-family:inherit;letter-spacing:.05em;color:var(--text3);cursor:pointer;transition:all .15s;white-space:nowrap}
.sort-btn.active,.grp-btn.active{background:var(--inv-bg);color:var(--inv-text);border-color:var(--inv-bg)}
.srch-res-cnt{font-size:11px;color:var(--text4);padding:8px 0 4px}
mark{background:#ffe49a;color:inherit;border-radius:2px;padding:0 1px}
html.dark mark{background:#5e3e00;color:var(--text)}
.srch-card{border-bottom:1px solid var(--line2);padding:13px 0;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:opacity .1s}
.srch-card:active{opacity:.65}
.srch-title{font-family:'BookkMyungjo',serif;font-size:15px;font-weight:700;color:var(--text);line-height:1.4;margin-top:5px}
.srch-snip{font-size:12px;color:var(--text2);line-height:1.7;margin-top:5px}
.srch-arrow{float:right;font-size:13px;color:var(--text4);margin-top:3px;margin-left:8px}
.srch-grp-hd{font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--text4);padding:18px 0 6px;display:flex;align-items:center;gap:8px}
.srch-grp-hd::after{content:'';flex:1;height:1px;background:var(--line)}
.srch-gcnt{background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:1px 7px;font-size:10px;color:var(--text3);font-weight:400;letter-spacing:0;text-transform:none}

/* ── DETAIL ──────────────────────────────────── */
#detail-view{padding-bottom:60px}
.det-back{display:inline-flex;align-items:center;gap:6px;background:none;border:none;font-family:inherit;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);cursor:pointer;padding:0;margin-bottom:20px;-webkit-tap-highlight-color:transparent}
.det-back:active{opacity:.6}
.det-meta{display:flex;gap:5px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
.det-title{font-family:'BookkMyungjo',serif;font-size:20px;font-weight:700;color:var(--text);line-height:1.4;margin-bottom:18px;text-decoration:none;display:block;word-break:keep-all}
.det-title:active{opacity:.7}
.det-url{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--text4);text-decoration:none;border-bottom:1px solid var(--line);padding-bottom:1px;margin-bottom:18px;word-break:break-all}
.det-url:active{opacity:.7}
.det-sec{background:var(--bg2);border:1px solid var(--line);border-left:3px solid;border-radius:2px;padding:12px 14px;margin-bottom:10px;transition:background .2s}
.det-body{font-size:13px;color:var(--text2);line-height:1.8;margin-top:6px}
.det-acts{margin-top:22px;display:flex;gap:10px}
.det-divider{height:1px;background:var(--line2);margin:20px 0}

/* ── ANALYSIS — WRITING LIST ─────────────────── */
#write-list-view{padding-bottom:20px}
.wlist-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:0;padding-bottom:12px;border-bottom:1px solid var(--line)}
.wlist-title{font-family:'BookkMyungjo',serif;font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text3)}
/* group tab bar — mirrors srcbar style */
#wlist-gbar{display:flex;gap:0;overflow-x:auto;padding:8px 0 0;margin-bottom:14px;scrollbar-width:none;-webkit-overflow-scrolling:touch;border-bottom:1px solid var(--line2)}
#wlist-gbar::-webkit-scrollbar{display:none}
.wgrp-btn{background:none;border:none;padding:6px 12px 6px 0;font-size:10px;font-weight:700;font-family:inherit;letter-spacing:.07em;cursor:pointer;white-space:nowrap;color:var(--text4);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s}
.wgrp-btn.active{color:var(--text);border-bottom-color:var(--text)}
/* grid */
.wgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:380px){.wgrid{grid-template-columns:1fr}}
.wgrid-card{background:var(--card);border:1px solid var(--line);border-radius:3px;padding:13px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:opacity .1s;display:flex;flex-direction:column;min-height:120px}
.wgrid-card:active{opacity:.7}
.wgrid-card-meta{display:flex;gap:4px;flex-wrap:wrap;align-items:center;margin-bottom:7px}
.wgrid-card-title{font-family:'BookkMyungjo',serif;font-size:14px;font-weight:700;color:var(--text);line-height:1.4;margin-bottom:6px;word-break:keep-all}
.wgrid-card-preview{font-size:11px;color:var(--text3);line-height:1.6;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;flex:1}
.wgrid-card-acts{display:flex;gap:12px;margin-top:10px;padding-top:8px;border-top:1px solid var(--line2);flex-shrink:0}
/* grouped sections */
.wgrp-section{margin-bottom:22px}
.wgrp-hd{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.wgrp-hd-lbl{font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--text4);white-space:nowrap}
.wgrp-hd-line{flex:1;height:1px;background:var(--line)}
.wgrp-hd-cnt{background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:1px 8px;font-size:10px;color:var(--text3);font-weight:400;letter-spacing:0;text-transform:none;white-space:nowrap}
/* compat */
.wcard{display:none}
.wcard-meta,.wcard-title,.wcard-preview,.wcard-acts{display:none}
/* search result: analysis badge */
.analysis-srch-sep{margin-top:4px}
.srch-analysis-badge{display:inline-block;padding:1px 7px;font-size:9px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;border-radius:2px;background:var(--bg3);color:var(--text3);border:1px solid var(--line)}

/* ── ANALYSIS — EDITOR ───────────────────────── */
#editor-view{padding-bottom:60px}
.ed-title-inp{width:100%;background:transparent;border:none;border-bottom:2px solid var(--line);color:var(--text);padding:6px 0 10px;font-size:21px;font-family:'BookkMyungjo',serif;font-weight:700;outline:none;margin-bottom:14px;transition:border-color .2s}
.ed-title-inp::placeholder{color:var(--text4)}
.ed-title-inp:focus{border-bottom-color:var(--text2)}
.ed-meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.ed-meta-row{display:flex;gap:8px;margin-bottom:14px}
.ed-meta-row .finp{flex:1;font-size:12px;padding:7px 9px}
.ed-meta-row .fsel{flex:1;font-size:12px;padding:7px 9px}
.ed-toolbar{
  display:flex;gap:2px;flex-wrap:wrap;align-items:center;
  padding:7px 0 8px;border-top:1px solid var(--line);border-bottom:1px solid var(--line);
  margin-bottom:18px;position:sticky;top:var(--hdr-h,106px);
  background:var(--bg);z-index:10;transition:background .2s;
}
.tb-btn{background:none;border:1px solid transparent;border-radius:2px;padding:4px 9px;font-size:12px;font-family:'BookkMyungjo',serif;color:var(--text2);cursor:pointer;transition:all .12s;line-height:1.3;white-space:nowrap}
.tb-btn:hover,.tb-btn:focus{background:var(--bg2)}
.tb-btn:active{background:var(--bg3);border-color:var(--line)}
.tb-sep{width:1px;height:16px;background:var(--line2);margin:0 2px;flex-shrink:0;align-self:center}
.tb-lbl{font-size:9px;font-weight:700;letter-spacing:.08em;color:var(--text4);text-transform:uppercase;padding:0 3px;align-self:center}
#editor-area{min-height:320px;outline:none;font-family:'BookkMyungjo',serif;font-size:15px;font-weight:400;line-height:1.9;color:var(--text);caret-color:var(--text);word-break:keep-all}
#editor-area:empty::before{content:attr(data-placeholder);color:var(--text4);pointer-events:none}
#editor-area p{margin-bottom:.5em}
#editor-area h1{font-family:'BookkMyungjo',serif;font-size:23px;font-weight:700;line-height:1.35;margin:16px 0 8px}
#editor-area h2{font-family:'BookkMyungjo',serif;font-size:18px;font-weight:700;line-height:1.4;margin:14px 0 7px}
#editor-area blockquote{border-left:3px solid var(--gold);padding:6px 0 6px 14px;color:var(--text2);margin:12px 0;font-style:italic}
#editor-area hr{border:none;border-top:1px solid var(--line);margin:18px 0;display:block}
#editor-area img{max-width:100%;border-radius:3px;margin:8px 0;display:block}
#editor-area b,#editor-area strong{font-weight:700}
#editor-area i,#editor-area em{font-style:italic}
.ed-acts{display:flex;gap:10px;margin-top:28px;padding-top:16px;border-top:1px solid var(--line2)}

/* ── ANALYSIS — READ ─────────────────────────── */

.wr-back{display:inline-flex;align-items:center;gap:5px;background:none;border:none;font-family:inherit;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);cursor:pointer;padding:0;margin-bottom:22px;-webkit-tap-highlight-color:transparent}

.wr-divider{height:1px;background:var(--line2);margin-bottom:22px}
.wr-body{font-family:'BookkMyungjo',serif;font-size:15px;font-weight:400;line-height:1.9;color:var(--text);word-break:keep-all}
.wr-body p{margin-bottom:.7em}
.wr-body h1{font-size:22px;font-weight:700;margin:20px 0 9px;line-height:1.35}
.wr-body h2{font-size:18px;font-weight:700;margin:16px 0 7px;line-height:1.4}
.wr-body blockquote{border-left:3px solid var(--gold);padding:6px 0 6px 14px;color:var(--text2);margin:12px 0;font-style:italic}
.wr-body hr{border:none;border-top:1px solid var(--line);margin:20px 0}
.wr-body img{max-width:100%;border-radius:3px;margin:10px 0;display:block}

/* ══ ANIMATIONS ════════════════════════════════ */
html{scroll-behavior:smooth}

/* View enter: fade + slide up */
@keyframes viewSlideUp{
  from{opacity:0;transform:translateY(20px)}
  to{opacity:1;transform:translateY(0)}
}
.view-enter{animation:viewSlideUp .42s cubic-bezier(0.16,1,0.3,1) both}

/* Card/item reveal (IO-driven) */
.c-hidden{opacity:0;transform:translateY(14px);will-change:opacity,transform}
.c-visible{
  opacity:1;transform:translateY(0);
  transition:opacity .46s cubic-bezier(0.16,1,0.3,1),
             transform .46s cubic-bezier(0.16,1,0.3,1);
}

/* Expand panel slide-down */
@keyframes expandSlide{
  from{opacity:0;transform:translateY(-8px)}
  to{opacity:1;transform:translateY(0)}
}
.aexp{animation:expandSlide .32s cubic-bezier(0.16,1,0.3,1) both}

/* Header shadow on scroll */
#header{transition:background .2s,border-color .2s,box-shadow .35s ease}
#header.hdr-shadow{box-shadow:0 3px 18px rgba(0,0,0,.07)}
html.dark #header.hdr-shadow{box-shadow:0 3px 18px rgba(0,0,0,.35)}

/* Nav icon bounce on active */
.bnav-icon{transition:color .18s ease,transform .3s cubic-bezier(0.34,1.56,0.64,1)}
.bnav-lbl{transition:color .18s ease}
.bnav-btn.active .bnav-icon{transform:scale(1.18) translateY(-1px)}

/* Grid card hover lift */
.wgrid-card{
  transition:opacity .1s,
             transform .24s cubic-bezier(0.34,1.56,0.64,1),
             box-shadow .24s ease,
             background .2s,border-color .2s;
}
.wgrid-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.09)}
html.dark .wgrid-card:hover{box-shadow:0 8px 24px rgba(0,0,0,.45)}

/* Scrap card hover */
.art{transition:background .15s;-webkit-tap-highlight-color:transparent}
.srch-card{transition:opacity .1s,background .15s}

/* Button press feedback */
.btnp,.btns,.nav-btn,.wgrp-btn{transition:transform .1s ease,opacity .12s,background .15s,color .15s,border-color .15s}
.btnp:active{transform:scale(0.96)}
.btns:active{transform:scale(0.97)}
.nav-btn:active{transform:scale(0.95)}

/* Form field focus glow */
.finp,.ftxt,.sinp{transition:background .2s,border-color .2s,box-shadow .25s ease}
.finp:focus,.ftxt:focus,.sinp:focus{box-shadow:0 0 0 3px rgba(28,22,8,.07);outline:none}
html.dark .finp:focus,html.dark .ftxt:focus,html.dark .sinp:focus{box-shadow:0 0 0 3px rgba(240,232,216,.08)}

/* Toast spring */
#toast{transition:opacity .28s cubic-bezier(0.34,1.56,0.64,1),transform .28s cubic-bezier(0.34,1.56,0.64,1)}

/* Source bar chip transition */
.sb{transition:color .18s ease,border-color .18s ease}

/* Bottom nav divider */
.bnav-btn{transition:background .15s}
</style>
</head>

<script>
const DS=[
  {id:'hankyoreh',label:'한겨레',color:'#4A7C59'},
  {id:'aljazeera',label:'Al Jazeera',color:'#C8102E'},
  {id:'cna',label:'CNA',color:'#1A3A5C'},
  {id:'cnn_latam',label:'CNN Latin Am.',color:'#CC0000'},
  {id:'bbc_africa',label:'BBC Africa',color:'#B80000'},
  {id:'eurasianet',label:'Eurasianet',color:'#5C4A8A'},
];
const DT=['정치·외교','경제·무역','사회·인권','기후·환경','분쟁·안보','문화·종교','기술·혁신','보건·의료'];

let arts=[],srcs=[],topics=[],writings=[],theme='light';
let fsrc='',expId=null,editId=null,view='feed';
let srchOrder='new',srchGrp='all',prevView='search';
let activeTab='scrap',analysisViewState='write-list',editingWriting=null,wlistGrp='all';

function load(){
  arts=JSON.parse(localStorage.getItem('wp_a')||'[]');
  srcs=JSON.parse(localStorage.getItem('wp_s')||'null')||JSON.parse(JSON.stringify(DS));
  topics=JSON.parse(localStorage.getItem('wp_t')||'null')||[...DT];
  theme=localStorage.getItem('wp_th')||'light';
  writings=JSON.parse(localStorage.getItem('wp_w')||'[]');
}
function persist(){
  localStorage.setItem('wp_a',JSON.stringify(arts));
  localStorage.setItem('wp_s',JSON.stringify(srcs));
  localStorage.setItem('wp_t',JSON.stringify(topics));
  localStorage.setItem('wp_th',theme);
  localStorage.setItem('wp_w',JSON.stringify(writings));
}

function getSrc(id){return srcs.find(s=>s.id===id)||{label:id,color:'#888'}}
function bdg(t,c){return`<span class="bdg" style="background:${c}22;color:${c};border:1px solid ${c}44">${t}</span>`}

/* ══ ANIMATION ENGINE ══════════════════════════ */
let _cObs=null;
function _initObs(){
  if(_cObs)_cObs.disconnect();
  _cObs=new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      if(e.isIntersecting){
        e.target.classList.remove('c-hidden');
        e.target.classList.add('c-visible');
        _cObs.unobserve(e.target);
      }
    });
  },{threshold:0.04,rootMargin:'0px 0px -8px 0px'});
}
function staggerReveal(sel,parent,step=52,cap=500){
  requestAnimationFrame(()=>{
    const els=(parent||document).querySelectorAll(sel);
    els.forEach((el,i)=>{
      el.classList.remove('c-visible');
      el.classList.add('c-hidden');
      el.style.transitionDelay=Math.min(i*step,cap)+'ms';
      if(_cObs)_cObs.observe(el);
    });
  });
}
function animateView(id){
  const el=document.getElementById(id);if(!el)return;
  el.classList.remove('view-enter');
  void el.offsetWidth;
  el.classList.add('view-enter');
}
/* Header shadow on scroll */
window.addEventListener('scroll',()=>{
  document.getElementById('header').classList.toggle('hdr-shadow',window.scrollY>4);
},{passive:true});

/* THEME */
function applyTheme(){
  document.documentElement.className=theme;
  const L=theme==='light';
  document.getElementById('theme-btn').textContent=L?'☀︎':'☾';
  document.getElementById('theme-meta').content=L?'#f5f0e8':'#0c0c0c';
  const lbl=document.getElementById('theme-lbl');
  const sbtn=document.getElementById('theme-sbtn');
  if(lbl)lbl.textContent=L?'현재: 라이트 모드 (밝은 배경)':'현재: 다크 모드 (어두운 배경)';
  if(sbtn)sbtn.textContent=L?'다크 모드로':'라이트 모드로';
}
function toggleTheme(){theme=theme==='light'?'dark':'light';applyTheme();persist()}

function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)}

/* ── BOTTOM NAV ────────────────────── */
function switchTab(tab){
  activeTab=tab;
  const isSc=tab==='scrap';
  document.getElementById('scrap-nav').style.display=isSc?'flex':'none';
  document.getElementById('analysis-nav').style.display=isSc?'none':'flex';
  document.getElementById('srcbar').style.display=isSc?'flex':'none';
  document.getElementById('logo-sub').textContent=isSc?'Personal News Scrapbook':'Analysis & Writing';
  document.getElementById('footer').style.display=isSc?'flex':'none';
  document.querySelectorAll('.bnav-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
  const all=['feed','compare','add','settings','search','detail','write-list','editor','writing-read'];
  all.forEach(n=>{const el=document.getElementById(n+'-view');if(el)el.style.display='none'});
  if(isSc){
    const el=document.getElementById((view||'feed')+'-view');
    if(el)el.style.display='block';

  } else {
    switchAnalysisView(analysisViewState);
  }

function switchView(v){
  view=v;
  ['feed','compare','add','settings','search','detail'].forEach(n=>{
    const el=document.getElementById(n+'-view');
    if(el)el.style.display=n===v?'block':'none';
  });
  document.querySelectorAll('#scrap-nav .nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.view===v));
  if(v==='feed')renderFeed();
  if(v==='compare')renderCmp();
  if(v==='settings')renderSettings();

}

function openAdd(a){

function saveArticle(){
  const title=document.getElementById('f-title').value.trim();
  const url=document.getElementById('f-url').value.trim();
  if(!title||!url){toast('제목과 URL은 필수입니다');return}
  const a={id:editId||Date.now(),title,url,
    source:document.getElementById('f-source').value,
    date:document.getElementById('f-date').value,
    region:document.getElementById('f-region').value,
    topic:document.getElementById('f-topic').value,
    event_tag:document.getElementById('f-event').value.trim(),
    summary:document.getElementById('f-summary').value.trim(),
    perspective:document.getElementById('f-perspective').value.trim(),
    memo:document.getElementById('f-memo').value.trim()};
  if(editId)arts=arts.map(x=>x.id===editId?a:x);
  else arts.unshift(a);
  editId=null;persist();updEvt();toast('저장했습니다');
  switchView(prevView==='detail'?'search':'feed');
}

function delArt(id){
  if(!confirm('삭제할까요?'))return;
  arts=arts.filter(a=>a.id!==id);persist();updEvt();renderFeed();toast('삭제했습니다');
}

function renderSrcBar(){
  document.getElementById('srcbar').innerHTML=
    `<button class="sb ${fsrc===''?'active':''}" style="--src-c:var(--text)" data-src="" onclick="fltSrc('')">ALL</button>`

function fltSrc(s){fsrc=s;renderSrcBar();renderFeed()}

function renderTopicFlt(){

function renderFeed(){
  renderSrcBar();renderTopicFlt();
  const q=document.getElementById('sinp').value.toLowerCase();

    if(ev&&a.event_tag!==ev)return false;

    return true;
  });

    const sh=a.summary&&a.summary.length>130?a.summary.slice(0,130)+'…':(a.summary||'');
    const more=(a.summary&&a.summary.length>130)||a.perspective||a.memo;
    const enc=encodeURIComponent(JSON.stringify(a));
    return`<div class="art">
      <div class="abar" style="background:${s.color}"></div>
      <div class="abody">
        <div class="ameta">
          ${bdg(s.label,s.color)}<span style="font-size:10px;color:var(--text4)">${a.date}</span>
          ${bdg(a.region,'#888')}${bdg(a.topic,'#4a7a5a')}
          ${a.event_tag?bdg('⌗ '+a.event_tag,'#a07840'):''}
        </div>
        <a class="atitle" href="${a.url}" target="_blank" rel="noreferrer">${a.title}</a>
        ${a.summary?`<div class="asum">${ex?a.summary:sh}</div>`:''}
        ${ex&&a.perspective?`<div class="aexp" style="border-left-color:${s.color}"><div class="explbl">시각·논조</div>${a.perspective}</div>`:''}
        ${ex&&a.memo?`<div class="aexp" style="border-left-color:var(--gold)"><div class="explbl">나의 메모</div>${a.memo}</div>`:''}
        <div class="aacts">

          <button class="aact" onclick="openAdd(JSON.parse(decodeURIComponent('${enc}')))">수정</button>

      </div>

  staggerReveal('.art',list,55,480);
}
function togExp(id){expId=expId===id?null:id;renderFeed()}

function addSrc(){const label=document.getElementById('new-src-n').value.trim();const color=document.getElementById('new-src-c').value;if(!label){toast('이름을 입력해주세요');return}srcs.push({id:'s'+Date.now(),label,color});document.getElementById('new-src-n').value='';document.getElementById('new-src-c').value='#888888';document.getElementById('new-src-sw').style.background='#888888';persist();renderSettings();renderSrcBar();renderFooter();toast(`"${label}" 추가됨`)}

/* SEARCH */
function setSortOrder(o){srchOrder=o;document.querySelectorAll('.sort-btn').forEach(b=>b.classList.toggle('active',b.dataset.o===o));renderSearch()}
function setGrpMode(m){srchGrp=m;document.querySelectorAll('.grp-btn').forEach(b=>b.classList.toggle('active',b.dataset.m===m));renderSearch()}
function highlight(text,q){if(!q||!text)return text||'';const esc=q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');return text.replace(new RegExp('('+esc+')','gi'),'<mark>$1</mark>')}
function getSnippet(text,q){if(!text||!q)return '';const lo=text.toLowerCase(),qi=lo.indexOf(q.toLowerCase());if(qi<0)return text.slice(0,90)+(text.length>90?'…':'');const s=Math.max(0,qi-38),e=Math.min(text.length,qi+q.length+60);return(s>0?'…':'')+text.slice(s,e)+(e<text.length?'…':'')}
function clearSearch(){document.getElementById('srch-inp').value='';renderSearch();document.getElementById('srch-inp').focus()}
function wrtSrchCard(w,q){
  const plain=(w.content||'').replace(/<[^>]+>/g,'').replace(/\s+/g,' ').trim();
  let snip='';
  if(plain.toLowerCase().includes(q.toLowerCase()))snip=getSnippet(plain,q);
  else if((w.title||'').toLowerCase().includes(q.toLowerCase()))snip='';
  return`<div class="srch-card" onclick="viewWritingFromSearch(${w.id})">
    <div class="ameta" style="margin-bottom:4px">
      <span class="srch-analysis-badge">Analysis</span>
      <span style="font-size:10px;color:var(--text4)">${w.date||''}</span>
      ${w.region?bdg(w.region,'#888'):''}${w.topic?bdg(w.topic,'#4a7a5a'):''}${w.event_tag?bdg('⌗ '+w.event_tag,'#a07840'):''}
      <span class="srch-arrow">›</span>
    </div>
    <div class="srch-title">${highlight(w.title||'(제목 없음)',q)}</div>
    ${snip?`<div class="srch-snip">${highlight(snip,q)}</div>`:''}
  </div>`;
}
function viewWritingFromSearch(id){analysisViewState='write-list';switchTab('analysis');readWriting(id)}
function renderSearch(){
  const inp=document.getElementById('srch-inp'),q=inp.value.trim();
  const clearBtn=document.getElementById('srch-clear-btn'),ctrl=document.getElementById('srch-ctrl');
  const results=document.getElementById('srch-results'),empty=document.getElementById('srch-empty');
  const hint=document.getElementById('srch-hint'),cnt=document.getElementById('srch-cnt');
  clearBtn.style.display=q?'block':'none';
  if(!q){ctrl.style.display='none';results.innerHTML='';empty.style.display='none';hint.style.display='block';return}
  const ql=q.toLowerCase();
  /* scrap articles */
  let filtered=arts.filter(a=>(a.title||'').toLowerCase().includes(ql)||(a.summary||'').toLowerCase().includes(ql)||(a.perspective||'').toLowerCase().includes(ql)||(a.memo||'').toLowerCase().includes(ql)||(a.event_tag||'').toLowerCase().includes(ql)||(a.region||'').toLowerCase().includes(ql)||(a.topic||'').toLowerCase().includes(ql));
  filtered=[...filtered].sort((a,b)=>{const da=new Date(a.date||'1970-01-01'),db=new Date(b.date||'1970-01-01');return srchOrder==='new'?db-da:da-db});
  /* analysis writings */
  let filteredW=writings.filter(w=>(w.title||'').toLowerCase().includes(ql)||((w.content||'').replace(/<[^>]+>/g,'').toLowerCase()).includes(ql)||(w.event_tag||'').toLowerCase().includes(ql)||(w.region||'').toLowerCase().includes(ql)||(w.topic||'').toLowerCase().includes(ql));
  filteredW=[...filteredW].sort((a,b)=>{const da=new Date(a.date||'1970-01-01'),db=new Date(b.date||'1970-01-01');return srchOrder==='new'?db-da:da-db});
  ctrl.style.display='block';hint.style.display='none';
  const total=filtered.length+filteredW.length;
  if(!total){results.innerHTML='';cnt.textContent='';empty.style.display='block';return}
  empty.style.display='none';
  cnt.textContent=total===filtered.length?`검색 결과 ${total}건`:`검색 결과 ${total}건 (스크랩 ${filtered.length} · 분석글 ${filteredW.length})`;
  let html='';
  /* scrap section */
  if(filtered.length){
    if(filteredW.length)html+=`<div class="srch-grp-hd">스크랩<span class="srch-gcnt">${filtered.length}건</span></div>`;
    if(srchGrp==='all'){html+=filtered.map(a=>srchCard(a,q)).join('')}
    else{const keyMap={region:'region',topic:'topic',event:'event_tag'};const key=keyMap[srchGrp];const grps={};filtered.forEach(a=>{const k=(a[key])||'(미지정)';if(!grps[k])grps[k]=[];grps[k].push(a)});html+=Object.entries(grps).map(([k,as])=>`<div><div class="srch-grp-hd">${k}<span class="srch-gcnt">${as.length}건</span></div>${as.map(a=>srchCard(a,q)).join('')}</div>`).join('')}
  }
  /* analysis writings section */
  if(filteredW.length){
    html+=`<div class="srch-grp-hd analysis-srch-sep">Analysis 글<span class="srch-gcnt">${filteredW.length}건</span></div>`;
    html+=filteredW.map(w=>wrtSrchCard(w,q)).join('');
  }
  results.innerHTML=html;
  staggerReveal('.srch-card',results,45,420);
}
function srchCard(a,q){
  const s=getSrc(a.source);let snip='';
  for(const f of ['summary','perspective','memo']){if(a[f]&&a[f].toLowerCase().includes(q.toLowerCase())){snip=getSnippet(a[f],q);break}}
  return`<div class="srch-card" onclick="openDetail(${a.id})">
    <div class="ameta" style="margin-bottom:4px">${bdg(s.label,s.color)}<span style="font-size:10px;color:var(--text4)">${a.date||''}</span>${a.region?bdg(a.region,'#888'):''}${a.topic?bdg(a.topic,'#4a7a5a'):''}${a.event_tag?bdg('⌗ '+a.event_tag,'#a07840'):''}<span class="srch-arrow">›</span></div>
    <div class="srch-title">${highlight(a.title||'(제목 없음)',q)}</div>
    ${snip?`<div class="srch-snip">${highlight(snip,q)}</div>`:''}
  </div>`;
}

function openDetail(id){

    <div class="det-meta">${bdg(s.label,s.color)}<span style="font-size:11px;color:var(--text4)">${a.date||''}</span>${a.region?bdg(a.region,'#888'):''}${a.topic?bdg(a.topic,'#4a7a5a'):''}${a.event_tag?bdg('⌗ '+a.event_tag,'#a07840'):''}</div>

    ${a.perspective?`<div class="det-sec" style="border-left-color:${s.color}"><div class="explbl">시각·논조</div><div class="det-body">${highlight(a.perspective,q)}</div></div>`:''}

    </div>`;

function closeDetail(){switchView(prevView||'search')}

/* ══ ANALYSIS ══════════════════════════════ */

function switchAnalysisView(v){
  analysisViewState=v;
  ['write-list','editor','writing-read'].forEach(n=>{const el=document.getElementById(n+'-view');if(el)el.style.display='none'});
  const el=document.getElementById(v+'-view');if(el)el.style.display='block';
  const nb=document.getElementById('analysis-write-btn');
  if(nb)nb.style.visibility=v==='write-list'?'visible':'hidden';
  if(v==='write-list')renderWritingList();
  animateView(v+'-view');
  window.scrollTo({top:0,behavior:'smooth'});
}

function setWlistGrp(g){
  wlistGrp=g;
  document.querySelectorAll('.wgrp-btn').forEach(b=>b.classList.toggle('active',b.dataset.g===g));
  renderWritingList();
}

function renderWritingList(){
  const listEl=document.getElementById('writing-list');
  const empty=document.getElementById('writing-empty');
  const list=[...writings].sort((a,b)=>b.id-a.id);

  if(!list.length){listEl.innerHTML='';empty.style.display='block';return}
  empty.style.display='none';

  /* card template */
  const cardHTML=w=>{
    const preview=(w.content||'').replace(/<[^>]+>/g,'').replace(/\s+/g,' ').trim().slice(0,80);
    return`<div class="wgrid-card" onclick="readWriting(${w.id})">
      <div class="wgrid-card-meta">
        ${w.date?`<span style="font-size:10px;color:var(--text4)">${w.date}</span>`:''}
        ${w.region?bdg(w.region,'#888'):''}${w.topic?bdg(w.topic,'#4a7a5a'):''}
        ${w.event_tag?bdg('⌗ '+w.event_tag,'#a07840'):''}
      </div>
      <div class="wgrid-card-title">${w.title||'(제목 없음)'}</div>
      ${preview?`<div class="wgrid-card-preview">${preview}${preview.length>=80?'…':''}</div>`:''}
      <div class="wgrid-card-acts">
        <button class="aact" onclick="event.stopPropagation();openEditor(${w.id})">수정</button>
        <button class="aact del" onclick="event.stopPropagation();deleteWriting(${w.id})">삭제</button>
      </div>
    </div>`;
  };

  /* flat grid (전체) */
  if(wlistGrp==='all'){
    listEl.innerHTML=`<div class="wgrid">${list.map(cardHTML).join('')}</div>`;
    staggerReveal('.wgrid-card',listEl,55,480);
    return;
  }

  /* grouped */
  const keyMap={topic:'topic',region:'region',event:'event_tag'};
  const key=keyMap[wlistGrp];
  const grps={};
  list.forEach(w=>{const k=w[key]||'(미지정)';if(!grps[k])grps[k]=[];grps[k].push(w)});
  listEl.innerHTML=Object.entries(grps).map(([k,ws])=>`
    <div class="wgrp-section">
      <div class="wgrp-hd">
        <span class="wgrp-hd-lbl">${k}</span>
        <div class="wgrp-hd-line"></div>
        <span class="wgrp-hd-cnt">${ws.length}건</span>
      </div>
      <div class="wgrid">${ws.map(cardHTML).join('')}</div>
    </div>`).join('');
  staggerReveal('.wgrp-section',listEl,80,400);
}

function openEditor(id){
  editingWriting=id;
  const w=id?writings.find(x=>x.id===id):null;
  const etop=document.getElementById('ed-topic');
  etop.innerHTML='<option value="">주제 선택</option>'+topics.map(t=>`<option>${t}</option>`).join('');
  document.getElementById('ed-title').value=w?.title||'';
  document.getElementById('editor-area').innerHTML=w?.content||'';
  document.getElementById('ed-region').value=w?.region||'';
  etop.value=w?.topic||'';
  document.getElementById('ed-event').value=w?.event_tag||'';
  document.getElementById('ed-date').value=w?.date||new Date().toISOString().slice(0,10);
  switchAnalysisView('editor');
  setTimeout(()=>document.getElementById('ed-title').focus(),80);
}

function cancelEditor(){editingWriting=null;switchAnalysisView('write-list')}

function saveWriting(){
  const title=document.getElementById('ed-title').value.trim();
  const content=document.getElementById('editor-area').innerHTML.trim();
  if(!title&&(!content||content==='<br>')){toast('제목이나 내용을 입력해주세요');return}
  const w={id:editingWriting||Date.now(),title,content,
    region:document.getElementById('ed-region').value,
    topic:document.getElementById('ed-topic').value,
    event_tag:document.getElementById('ed-event').value.trim(),
    date:document.getElementById('ed-date').value};
  if(editingWriting)writings=writings.map(x=>x.id===editingWriting?w:x);
  else writings.unshift(w);
  editingWriting=null;persist();toast('저장했습니다');switchAnalysisView('write-list');
}

function deleteWriting(id){
  if(!confirm('삭제할까요?'))return;
  writings=writings.filter(w=>w.id!==id);persist();renderWritingList();toast('삭제했습니다');
}

function readWriting(id){
  const w=writings.find(x=>x.id===id);if(!w)return;
  document.getElementById('wr-content').innerHTML=`
    <div class="wr-meta">
      ${w.date?`<span style="font-size:11px;color:var(--text4)">${w.date}</span>`:''}
      ${w.region?bdg(w.region,'#888'):''}${w.topic?bdg(w.topic,'#4a7a5a'):''}
      ${w.event_tag?bdg('⌗ '+w.event_tag,'#a07840'):''}
    </div>
    <div class="wr-title">${w.title||'(제목 없음)'}</div>
    <div class="wr-divider"></div>
    <div class="wr-body">${w.content||''}</div>
    <div class="wr-acts">
      <button class="btnp" onclick="openEditor(${w.id})" style="font-size:11px;padding:9px 20px">수정</button>
      <button class="btns" onclick="if(confirm('삭제할까요?')){writings=writings.filter(x=>x.id!==${w.id});persist();toast('삭제했습니다');switchAnalysisView('write-list')}" style="font-size:11px">삭제</button>
    </div>`;
  switchAnalysisView('writing-read');
}

/* EDITOR TOOLBAR */
function fmt(cmd){document.getElementById('editor-area').focus();document.execCommand(cmd,false,null)}
function fmtBlock(tag){document.getElementById('editor-area').focus();document.execCommand('formatBlock',false,tag)}
function insertHR(){document.getElementById('editor-area').focus();document.execCommand('insertHorizontalRule',false,null)}
function insertImg(){
  const url=prompt('이미지 URL을 입력하세요:');
  if(!url||!url.trim())return;
  document.getElementById('editor-area').focus();
  document.execCommand('insertHTML',false,`<img src="${url.trim()}" alt="" style="max-width:100%;border-radius:3px;margin:8px 0;display:block">`);
}

/* LAYOUT */
function adjPad(){
  const hh=document.getElementById('header').offsetHeight;
  const nh=document.getElementById('bnav').offsetHeight;
  document.getElementById('scroll-area').style.paddingTop=hh+'px';
  document.getElementById('scroll-area').style.paddingBottom=(nh+8)+'px';
  document.documentElement.style.setProperty('--hdr-h',hh+'px');
}

/* BOOT */
load();applyTheme();renderSrcBar();renderFooter();renderTopicFlt();updEvt();renderFeed();_initObs();
window.addEventListener('load',adjPad);
window.addEventListener('resize',adjPad);
setTimeout(adjPad,300);

if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
</script>
